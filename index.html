<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S_CARS Rental</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>S_CARS Rental</h1>
        <nav>
            <a href="index.html">HOME</a>
            <a href="#">VEHICLES</a>
            <a href="#">SERVICES</a>
            <a href="#">CONTACT</a>
            <a href="login.php">LOGIN</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Rent Your Ride Anytime</h2>
        <p id="bookinginfo"></p>
        <p>Cars at Affordable Prices</p>
        <button onclick="bookingpop()">Book Now</button>
    </section>

    <!-- Cars Section -->
    <section class="cars">
        <h2>Available Cars</h2>
        <div class="cars-list">
            <div class="card">
                <img src="images/swift.jpg" alt="Swift">
                <h3>Swift</h3>
                <p>₹800/day</p>
                <button onclick="bookingpop()">Rent Now</button>
            </div>

            <div class="card">
                <img src="images/xuv300.jpg" alt="XUV300">
                <h3>XUV300</h3>
                <p>₹1000/day</p>
                <button onclick="bookingpop()">Rent Now</button>
            </div>

            <div class="card">
                <img src="images/honda.jpg" alt="Honda">
                <h3>Honda</h3>
                <p>₹500/day</p>
                <button onclick="bookingpop()">Rent Now</button>
            </div>
        </div>
    </section>

    <!-- Booking Section -->
    <section class="booking">
        <h2>Book Your Car</h2>
        <form action="process.php" method="POST" onsubmit="submitForm(event)">
            <input type="text" name="name" id="name" placeholder="Name" required>
            <input type="email" name="email" id="email" placeholder="Email" required>
            <select name="vehicle" id="vehicle" required>
                <option value="">Select Vehicle</option>
                <option>Swift</option>
                <option>XUV300</option>
                <option>Honda</option>
            </select>
            <input type="date" name="start_date" id="start_date" required>
            <input type="date" name="end_date" id="end_date" required>
            <button type="submit" name="book">Submit</button>
        </form>
        <div id="result" style="margin-top: 15px; font-weight: bold; color: teal;"></div>
    </section>

    <!-- Feedback Section -->
    <section class="feedback">
        <h2>Feedback</h2>
        <p>Your valuable feedback means a lot to us.</p>
        <form action="process.php" method="POST">
            <input type="text" name="feedback" placeholder="Enter your feedback" required>
            <button type="submit" name="submit_feedback">Submit Feedback</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>THANK YOU</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
