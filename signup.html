<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - S_CARS Rental</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth { padding: 60px 20px; text-align: center; }
        .auth-message { font-weight: bold; margin-bottom: 20px; padding: 15px; border-radius: 5px;}
        .auth-success { color: #155724; background-color: #d4edda; }
        .auth-error { color: #721c24; background-color: #f8d7da; }
        .login-link { margin-top: 15px; display: block; color: teal; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1>S_CARS Rental</h1>
        <nav>
            <a href="index.html">HOME</a>
            <a href="#">VEHICLES</a>
            <a href="#">SERVICES</a>
            <a href="#">CONTACT</a>
            <a href="login.html">LOGIN</a>
        </nav>
    </header>

    <section class="auth">
        <h2>Create an Account</h2>
        <form action="signup.php" method="POST" class="auth-form">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <a href="login.html" class="login-link">Already have an account? Login here.</a>
    </section>

    <footer>
        <p>THANK YOU</p>
    </footer>
</body>
</html>
