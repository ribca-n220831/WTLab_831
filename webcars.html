<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S_CARS Rental</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #222;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: greenyellow;
        }

        nav a {
            color: greenyellow;
            margin-left: 30px;
            text-decoration: none;
        }

        nav a:hover {
            color: lavender;
        }

        .hero {
            background-color: teal;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h2 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .hero button {
            padding: 10px 20px;
            background: #222;
            color: pink;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }

        .cars {
            padding: 40px;
            text-align: center;
        }

        .cars-list {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            border: 1px solid #ddd;
            padding: 15px;
            width: 280px;
            border-radius: 8px;
        }

        .card img {
            width: 100%;
            border-radius: 5px;
        }

        .card button {
            margin-top: 10px;
            padding: 8px 15px;
            background: #f4b400;
            border: none;
            cursor: pointer;
        }

        .booking {
            background: #f9f9f9;
            padding: 40px;
            text-align: center;
        }

        .booking form,
        .feedback form,
        .auth form {
            max-width: 400px;
            margin: auto;
        }

        .booking input,
        .booking select,
        .feedback input,
        .auth input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        .booking button,
        .auth button {
            width: 100%;
            padding: 10px;
            background: #222;
            color: white;
            border: none;
            cursor: pointer;
        }

        footer {
            background: burlywood;
            color: tomato;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>S_CARS Rental</h1>
        <nav>
            <a href="index.html">HOME</a>
            <a href="#">VEHICLES</a>
            <a href="#">SERVICES</a>
            <a href="#">CONTACT</a>
            <a href="login.php">LOGIN</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Rent Your Ride Anytime</h2>
        <p id="bookinginfo"></p>
        <p>Cars at Affordable Prices</p>
        <button onclick="bookingpop()">Book Now</button>
    </section>

    <section class="cars">
        <h2>Available Cars</h2>
        <div class="cars-list">
            <div class="card">
                <img src="images/swift.jpg" alt="Swift">
                <h3>Swift</h3>
                <p>₹800/day</p>
                <button onclick="bookingpop()">Rent Now</button>
            </div>
            <div class="card">
                <img src="images/xuv300.jpg" alt="XUV300">
                <h3>XUV300</h3>
                <p>₹1000/day</p>
                <button onclick="bookingpop()">Rent Now</button>
            </div>
            <div class="card">
                <img src="images/honda.jpg" alt="Honda">
                <h3>Honda</h3>
                <p>₹500/day</p>
                <button onclick="bookingpop()">Rent Now</button>
            </div>
        </div>
    </section>

    <section class="booking">
        <h2>Book Your Car</h2>
        <form action="process.php" method="POST" onsubmit="submitForm(event)">
            <input type="text" name="name" id="name" placeholder="Name" required>
            <input type="email" name="email" id="email" placeholder="Email" required>
            <select name="vehicle" id="vehicle" required>
                <option value="">Select Vehicle</option>
                <option>Swift</option>
                <option>XUV300</option>
                <option>Honda</option>
            </select>
            <input type="date" name="start_date" id="start_date" required>
            <input type="date" name="end_date" id="end_date" required>
            <button type="submit" name="book">Submit</button>
        </form>
        <div id="result" style="margin-top: 15px; font-weight: bold; color: teal;"></div>
    </section>

    <section class="feedback">
        <h2>Feedback</h2>
        <p>Your valuable feedback means a lot to us.</p>
        <form action="process.php" method="POST">
            <input type="text" name="feedback" placeholder="Enter your feedback" required>
            <button type="submit" name="submit_feedback">Submit Feedback</button>
        </form>
    </section>

    <footer>
        <p>THANK YOU</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
